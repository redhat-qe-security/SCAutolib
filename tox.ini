[tox]
envlist = lint, ci, all-tests, coverage


[testenv]
set_env = PYTHONPATH=.

[testenv:lint]
deps =
    flake8>=7.0
    flake8-docstrings>=1.7.0
    ; flake8-rst-docstrings
    pydocstyle>=6.3.0
    pydoclint[flake8]
commands = flake8 SCAutolib/ test/ setup.py

[testenv:ci]
deps =
    -rrequirements.txt
    pytest
    pytest-env
commands = pytest test/ -sv -m "not ipa and not service_restart" {posargs}

[testenv:all-tests]
deps =
    {[testenv:ci]deps}
commands = pytest test/ {posargs}

[testenv:coverage]
deps =
    {[testenv:all-tests]deps}
    pytest-cov
commands =
    pip install -e .
    pytest --cov-report html:coverage --cov-report term --cov=SCAutolib test/ {posargs}

[flake8]
select = E,F,W,C,D,DOC

exclude =
    .git,
    __pycache__,
    SCAutolib/templates
max-complexity = 10
max-line-length = 81
ignore =
    # Ignore 'value maybe be undefined'
    F405,
    # Ignore warning for using * in import
    F403,
    # Ignore too complex functions
    C901,
    # Ignore invalid escape sequence for regular expressions
    W605,
    # Ignore one-line docstring should fit on one line with quotes
    D200,
    # Ignore class ...: __init__() should not have a docstring
    DOC301
per-file-ignores =
    # Ignore all docstring errors in the tests directory and setup.py
    test/*: D
    tests/*: D
    setup.py: D

docstring-convention = pep257
# Strictness levels: short, long, full
strictness = full
check-arg-order = True
arg-type-hints-in-docstring = True
check-return-types = True
require-return-section-when-returning = true
check-type-hint = true
